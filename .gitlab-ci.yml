stages:
  - release
  - package

release_job:
  tags: [docker]
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG                 # Run this job when a tag is created
  script:
    - echo "running release_job"
  release:                               # See https://docs.gitlab.com/ee/ci/yaml/#release for available properties
    tag_name: '$CI_COMMIT_TAG'
    description: 'Version $CI_COMMIT_TAG'

package_release:
  tags: [docker]
  stage: package
  image: python:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  variables:
    REGISTER_ID: 1563 # Models Package Registry
  script:
    - pip install build twine
    - python -m build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${REGISTER_ID}/packages/pypi dist/*
